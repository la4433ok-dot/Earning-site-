  function showAdsGramAd() {
    return new Promise((resolve, reject) => {
      if (!AdsgramAd) { reject("SDK missing"); return; }
      const loader = document.getElementById('adLoadingMsg');
      if (loader) loader.style.display = 'block';
      AdsgramAd.show().then((res) => {
        if (loader) loader.style.display = 'none';
        resolve(true);
      }).catch((err) => {
        if (loader) loader.style.display = 'none';
        reject(err);
      });
    });
  }

  const clickStateMap = new Map();

  async function handleWithAdFirst(event, targetElement, onSecondClickAction) {
    event.stopPropagation();
    event.preventDefault?.();
    let hasClickedBefore = clickStateMap.get(targetElement) || false;
    if (!hasClickedBefore) {
      clickStateMap.set(targetElement, true);
      try {
        await showAdsGramAd();
        alert("✅ বিজ্ঞাপন সম্পূর্ণ! এখন আবার ক্লিক করুন।");

      }
    } else {
      if (onSecondClickAction) onSecondClickAction();
    }
  }

  function bindCardClickWithAd(cardElement, videoObj) {
    const primaryAction = () => {
      if (confirm(`"${videoObj.title}" প্লে করতে চান?`)) window.open(videoObj.videoUrl, '_blank');
    };
    const handler = (e) => handleWithAdFirst(e, cardElement, primaryAction);
    cardElement.removeEventListener('click', cardElement._adClickHandler);
    cardElement._adClickHandler = handler;
    cardElement.addEventListener('click', handler);
  }
  function bindPlayButtonWithAd(playBtn, videoObj) {
    const primaryAction = () => {
      if (confirm(`"${videoObj.title}" প্লে করবেন?`)) window.open(videoObj.videoUrl, '_blank');
    };
    const handler = (e) => { e.stopPropagation(); handleWithAdFirst(e, playBtn, primaryAction); };
    playBtn.removeEventListener('click', playBtn._adPlayHandler);
    playBtn._adPlayHandler = handler;
    playBtn.addEventListener('click', handler);
  }
  function bindDownloadButtonWithAd(downloadBtn, videoObj) {
    const primaryAction = () => {
      const a = document.createElement('a');
      a.href = videoObj.downloadUrl;
      a.download = `${videoObj.title.replace(/[^a-z0-9]/gi, '_')}.mp4`;
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    };
    const handler = (e) => { e.stopPropagation(); handleWithAdFirst(e, downloadBtn, primaryAction); };
    downloadBtn.removeEventListener('click', downloadBtn._adDownHandler);
    downloadBtn._adDownHandler = handler;
    downloadBtn.addEventListener('click', handler);
  }

    window.location.href = FULLSCREEN_AD_URL;

    const timerInterval = setInterval(() => {
      if (redirectExecuted) { clearInterval(timerInterval); return; }
      countdownSeconds--;
      if (countdownSeconds >= 0) {
        countdownEl.innerText = `🎬 এড শুরু: ${countdownSeconds}s`;
        if (countdownSeconds === 0) clearInterval(timerInterval);
      } else clearInterval(timerInterval);

  function getFilteredVideos() {
    if (!searchQuery.trim()) return VIDEO_DATA;
    return VIDEO_DATA.filter(v => v.title.toLowerCase().includes(searchQuery.toLowerCase()));
  }
  function getTotalPages() { return Math.ceil(getFilteredVideos().length / ITEMS_PER_PAGE); }
  function getCurrentPageVideos() {
    const filtered = getFilteredVideos();
    const start = (currentPage - 1) * ITEMS_PER_PAGE;
    return filtered.slice(start, start + ITEMS_PER_PAGE);
  }

  function renderPagination() {
    const container = document.getElementById('paginationWrapper');
    if (!container) return;
    const totalPages = getTotalPages();
    container.innerHTML = '';
    for (let i = 1; i <= 10; i++) {
      const pageBtn = document.createElement('div');
      pageBtn.className = 'page-number';
      if (i === currentPage && i <= totalPages) pageBtn.classList.add('active-page');
      pageBtn.innerText = i;
      pageBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openPaginationLink(i);
        if (i <= totalPages) {
          currentPage = i;
          renderThumbnails();
          renderPagination();
        }
      });
      container.appendChild(pageBtn);
    }
  }
